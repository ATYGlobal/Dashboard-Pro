<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05080F;--sf:#0A0F1E;--sf2:#0F1628;
  --bd:rgba(0,255,136,0.09);
  --ng:#00FF88;--nc:#00D4FF;--nr:#FF3B5C;--na:#FFB800;--np:#C084FC;
  --tx:#D8E8FF;--tm:rgba(216,232,255,0.38);
  --fm:'Share Tech Mono',monospace;--fu:'Exo 2',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--fu)}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,255,136,.010) 3px,rgba(0,255,136,.010) 4px)}
#root{position:relative;z-index:1;display:flex;height:100vh;overflow:hidden}
/* SIDEBAR */
.sb{width:206px;flex-shrink:0;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column}
.sb-lg{padding:18px 15px 13px;border-bottom:1px solid var(--bd)}
.sb-lg .tg{font-family:var(--fm);font-size:9px;letter-spacing:3px;color:var(--ng);opacity:.6}
.sb-lg .nm{font-size:19px;font-weight:700;line-height:1.1;margin-top:2px}
.sb-lg .vr{font-family:var(--fm);font-size:9px;color:var(--tm);margin-top:3px}
.nav{padding:10px 0;flex:1;overflow-y:auto}
.ni{padding:9px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;
  color:var(--tm);border-left:2px solid transparent;transition:all .15s;user-select:none}
.ni:hover{color:var(--tx);background:rgba(0,255,136,.03)}
.ni.on{color:var(--ng);border-left-color:var(--ng);background:rgba(0,255,136,.06)}
.ni-ic{font-size:13px;width:18px;text-align:center;flex-shrink:0}
.nd{height:1px;background:var(--bd);margin:6px 13px}
.sb-ft{padding:10px 13px;border-top:1px solid var(--bd)}
.sb-st{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;position:relative}
.dot-g{background:var(--ng)}.dot-g::after{content:'';position:absolute;inset:-3px;border-radius:50%;background:rgba(0,255,136,.26);animation:pulse 2s infinite}
.dot-a{background:var(--na)}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(2.2);opacity:0}}
.sb-st-t{font-family:var(--fm);font-size:9px;letter-spacing:1px;color:var(--tm)}
.sb-tm{font-family:var(--fm);font-size:10px;color:var(--tm)}
/* MAIN */
.main{flex:1;overflow-y:auto;padding:20px;min-width:0}
.main::-webkit-scrollbar{width:3px}
.main::-webkit-scrollbar-thumb{background:rgba(0,255,136,.12);border-radius:2px}
/* PAGE HEADER */
.ph{margin-bottom:16px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap}
.ph h1{font-size:20px;font-weight:700}
.ph-tag{font-family:var(--fm);font-size:9px;letter-spacing:2px;color:var(--tm);margin-top:3px}
.ph-ac{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
/* KPI GRID */
.kg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:9px;margin-bottom:14px}
.kpi{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:12px 14px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.g::before{background:var(--ng)}.kpi.c::before{background:var(--nc)}
.kpi.r::before{background:var(--nr)}.kpi.a::before{background:var(--na)}.kpi.p::before{background:var(--np)}
.kl{font-family:var(--fm);font-size:9px;letter-spacing:2px;color:var(--tm);text-transform:uppercase;margin-bottom:6px}
.kv{font-size:24px;font-weight:700;line-height:1;font-family:var(--fm)}
.kv.g{color:var(--ng)}.kv.c{color:var(--nc)}.kv.r{color:var(--nr)}.kv.a{color:var(--na)}.kv.p{color:var(--np)}
.ks{font-family:var(--fm);font-size:10px;color:var(--tm);margin-top:4px}
/* CARDS */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:15px;margin-bottom:11px}
.ch{font-family:var(--fm);font-size:9px;letter-spacing:2px;color:var(--tm);text-transform:uppercase;
  margin-bottom:11px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
@media(max-width:820px){.g2{grid-template-columns:1fr}.sb{width:50px}.nl{display:none}}
/* ALERTS */
.al{border-radius:5px;padding:8px 11px;margin-bottom:9px;font-family:var(--fm);font-size:10px;letter-spacing:.5px;display:flex;align-items:center;gap:9px}
.al-r{background:rgba(255,59,92,.07);border:1px solid rgba(255,59,92,.20);color:var(--nr)}
.al-a{background:rgba(255,184,0,.07);border:1px solid rgba(255,184,0,.20);color:var(--na)}
.al-c{background:rgba(0,212,255,.07);border:1px solid rgba(0,212,255,.20);color:var(--nc)}
/* BADGES */
.badge{display:inline-block;padding:2px 7px;border-radius:3px;font-family:var(--fm);font-size:9px;letter-spacing:.8px;font-weight:600}
.bg{background:rgba(0,255,136,.09);color:var(--ng);border:1px solid rgba(0,255,136,.18)}
.br{background:rgba(255,59,92,.09);color:var(--nr);border:1px solid rgba(255,59,92,.18)}
.ba{background:rgba(255,184,0,.09);color:var(--na);border:1px solid rgba(255,184,0,.18)}
.bc{background:rgba(0,212,255,.09);color:var(--nc);border:1px solid rgba(0,212,255,.18)}
.bp{background:rgba(192,132,252,.09);color:var(--np);border:1px solid rgba(192,132,252,.18)}
.bx{background:rgba(255,255,255,.05);color:var(--tm);border:1px solid rgba(255,255,255,.09)}
/* BUTTONS */
.btn{padding:6px 12px;border-radius:5px;border:none;cursor:pointer;font-family:var(--fm);font-size:10px;letter-spacing:.8px;font-weight:600;transition:all .15s;flex-shrink:0}
.bn-g{background:rgba(0,255,136,.09);color:var(--ng);border:1px solid rgba(0,255,136,.20)}.bn-g:hover{background:rgba(0,255,136,.17)}
.bn-r{background:rgba(255,59,92,.09);color:var(--nr);border:1px solid rgba(255,59,92,.20)}.bn-r:hover{background:rgba(255,59,92,.17)}
.bn-a{background:rgba(255,184,0,.09);color:var(--na);border:1px solid rgba(255,184,0,.20)}.bn-a:hover{background:rgba(255,184,0,.17)}
.bn-c{background:rgba(0,212,255,.09);color:var(--nc);border:1px solid rgba(0,212,255,.20)}.bn-c:hover{background:rgba(0,212,255,.17)}
.btn-frz{background:rgba(255,59,92,.16);color:var(--nr);border:1px solid rgba(255,59,92,.36);animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}
/* TABLE */
.tw{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:12px;min-width:540px}
.tbl th{font-family:var(--fm);font-size:9px;letter-spacing:1px;color:var(--tm);text-align:left;padding:7px 9px;border-bottom:1px solid var(--bd);text-transform:uppercase;white-space:nowrap}
.tbl td{padding:8px 9px;border-bottom:1px solid rgba(255,255,255,.022);white-space:nowrap}
.tbl tr:hover td{background:rgba(0,255,136,.016)}
.mn{font-family:var(--fm)}.mt{color:var(--tm)}.f10{font-size:10px}.f11{font-size:11px}
/* RISK BAR */
.rb{display:flex;align-items:center;gap:7px;min-width:88px}
.rb-t{flex:1;height:3px;background:rgba(255,255,255,.07);border-radius:2px}
.rb-f{height:100%;border-radius:2px}
/* PAYOUT FLOW */
.flow{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:11px}
.fst{background:var(--sf2);border:1px solid var(--bd);border-radius:5px;padding:6px 11px;font-family:var(--fm);font-size:10px;letter-spacing:.8px;color:var(--tm);cursor:pointer;transition:all .15s}
.fst:hover,.fst.fa{border-color:var(--nc);color:var(--nc);background:rgba(0,212,255,.05)}
/* RETENTION */
.rr{display:grid;grid-template-columns:44px 1fr 40px;gap:8px;align-items:center;margin-bottom:8px}
.rl{font-family:var(--fm);font-size:10px;color:var(--tm)}
.rt{background:rgba(255,255,255,.06);border-radius:3px;height:4px}
.rf{height:100%;border-radius:3px;background:var(--nc)}
.rp{font-family:var(--fm);font-size:10px;color:var(--nc);text-align:right}
/* CHIPS */
.chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{padding:3px 9px;border-radius:20px;font-family:var(--fm);font-size:9px;letter-spacing:.8px;cursor:pointer;border:1px solid var(--bd);color:var(--tm);background:transparent;transition:all .15s}
.chip:hover{border-color:rgba(0,212,255,.3);color:var(--nc)}
.chip.on{border-color:var(--nc);color:var(--nc);background:rgba(0,212,255,.05)}
/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.mbox{background:var(--sf);border:1px solid rgba(0,212,255,.16);border-radius:10px;padding:22px;min-width:310px;max-width:450px;width:100%}
.mbox h3{font-size:14px;font-weight:700;margin-bottom:7px}
.mbox p{font-size:12px;color:var(--tm);margin-bottom:18px;line-height:1.65}
.macts{display:flex;gap:7px;justify-content:flex-end}
/* CONFIG */
.cfg{background:var(--sf2);border:1px solid rgba(255,184,0,.17);border-radius:6px;padding:10px 13px;margin-bottom:15px;display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.cfg-lbl{font-family:var(--fm);font-size:9px;letter-spacing:2px;color:var(--na);white-space:nowrap}
.cfg-in{background:var(--sf);border:1px solid var(--bd);border-radius:4px;padding:5px 9px;color:var(--tx);font-family:var(--fm);font-size:10px;flex:1;min-width:130px}
.cfg-in:focus{outline:1px solid var(--na)}.cfg-in::placeholder{color:var(--tm)}
/* PROGRESS BAR */
.pb-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.pb-lbl{font-family:var(--fm);font-size:10px;color:var(--tm);min-width:68px}
.pb-track{flex:1;height:5px;background:rgba(255,255,255,.06);border-radius:3px}
.pb-fill{height:100%;border-radius:3px}
.pb-val{font-family:var(--fm);font-size:10px;min-width:42px;text-align:right}
/* SEG MINI */
.sc{flex:1;background:var(--sf2);border:1px solid var(--bd);border-radius:6px;padding:9px;text-align:center;min-width:66px}
.top-row{display:flex;align-items:center;gap:9px;margin-bottom:8px}
/* LOADING */
.loading{padding:48px;text-align:center;font-family:var(--fm);font-size:11px;letter-spacing:2px;animation:lp 1s infinite}
@keyframes lp{0%,100%{opacity:.22}50%{opacity:1}}
/* PROFIT BAR */
.pbar{height:8px;background:rgba(255,255,255,.05);border-radius:4px;margin-top:8px;overflow:hidden}
.pbar-f{height:100%;border-radius:4px;transition:width .6s}
</style>
</head>

/* ─── HELPERS ────────────────────────────────────────── */
const cur = n => '€'+parseFloat(n||0).toFixed(2);
const fdt = s => s?(typeof s==='string'?s.slice(0,10):'--'):'--';
function bc(s){const m={active:'g',flagged:'a',blocked:'r',pending:'a',approved:'c',paid:'g',rejected:'r',validating:'c',inactive:'x'};return m[s]||'x';}

/* ─── useDB HOOK ─────────────────────────────────────── */
function useDB(table,order,fb){
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [mock,setMock]=useState(false);
  const load=useCallback(async()=>{
    if(isMock()||!sb){setData([...fb]);setMock(true);setLoading(false);return;}
    try{
      const {data:rows,error}=await sb.from(table).select('*').order(order,{ascending:false}).limit(300);
      if(error||!rows)throw error;
      setData(rows);setMock(false);
    }catch(e){setData([...fb]);setMock(true);}
    setLoading(false);
  },[table]);
  useEffect(()=>{load();const iv=setInterval(load,30000);return()=>clearInterval(iv);},[load]);
  return {data,loading,mock,reload:load};
}

/* ─── ATOMS ──────────────────────────────────────────── */
function KPI({l,v,s,c}){return E('div',{className:`kpi ${c}`},E('div',{className:'kl'},l),E('div',{className:`kv ${c}`},v),s&&E('div',{className:'ks'},s));}
function Bdg({t,label}){return E('span',{className:`badge b${t||'x'}`},label);}
function RBar({score}){
  const col=score>=70?'var(--nr)':score>=40?'var(--na)':'var(--ng)';
  return E('div',{className:'rb'},E('div',{className:'rb-t'},E('div',{className:'rb-f',style:{width:`${score}%`,background:col}})),E('span',{className:'mn f11',style:{color:col,minWidth:22}},score));
}
function Alrt({type,msg}){
  return E('div',{className:`al al-${type}`},E('b',null,type==='r'?'! ALERTA':type==='a'?'⚠ AVISO':'ℹ INFO'),E('span',null,' — '+msg));
}
function Modal({title,text,onOk,onCancel,okCls}){
  return E('div',{className:'mbg'},E('div',{className:'mbox'},E('h3',null,title),E('p',null,text),E('div',{className:'macts'},E('button',{className:'btn bn-c',onClick:onCancel},'CANCELAR'),E('button',{className:`btn ${okCls||'bn-r'}`,onClick:onOk},'CONFIRMAR'))));
}
function CfgBar({onApply}){

/* ─── SVG BAR CHART ──────────────────────────────────── */
function BarChart({data,ky,col}){
  const W=460,H=108,P=26,max=Math.max(...data.map(d=>d[ky]),1);
  const bw=Math.floor((W-P*2)/data.length)-4;
  return E('svg',{viewBox:`0 0 ${W} ${H}`,style:{width:'100%',height:'auto',display:'block'}},
    E('line',{x1:P,y1:H-17,x2:W-P,y2:H-17,stroke:'rgba(255,255,255,.07)',strokeWidth:1}),
    data.map((d,i)=>{
      const x=P+i*(bw+4);const bh=Math.max(4,((d[ky]/max)*(H-34)));const y=H-17-bh;
      return E('g',{key:i},
        E('rect',{x,y,width:bw,height:bh,rx:2,fill:col,opacity:.75}),
        E('text',{x:x+bw/2,y:H-3,textAnchor:'middle',fill:'rgba(216,232,255,.35)',fontSize:9,fontFamily:'Share Tech Mono'},d.day),
        E('text',{x:x+bw/2,y:y-3,textAnchor:'middle',fill:'rgba(216,232,255,.65)',fontSize:9,fontFamily:'Share Tech Mono'},d[ky])
      );
    })
  );
}

      E('div',{className:'ch'},E('span',null,'DIRECTORIO'),E('div',{className:'chips'},[{k:'all',l:'TODOS'},{k:'top',l:'TOP REV'},{k:'active',l:'ACTIVOS'},{k:'risk',l:'RIESGO'},{k:'blocked',l:'BLOCKED'}].map(f=>E('button',{key:f.k,className:`chip${filter===f.k?' on':''}`,onClick:()=>setFilter(f.k)},f.l)))),
      E('div',{className:'tw'},
        E('table',{className:'tbl'},
          E('thead',null,E('tr',null,['ID','EMAIL','GANADO','RETIRADO','REFS','RISK','ESTADO','LAST ACTIVE'].map(h=>E('th',{key:h},h)))),
          E('tbody',null,filtered.map(u=>E('tr',{key:u.id},
            E('td',null,E('span',{className:'mn f10 mt'},u.id)),
            E('td',null,u.email),
            E('td',null,E('span',{className:'mn f11',style:{color:'var(--ng)'}},cur(u.total_earned))),
            E('td',null,E('span',{className:'mn f11 mt'},cur(u.total_withdrawn))),
            E('td',null,E('span',{className:'mn f11',style:{color:u.referral_count>20?'var(--nr)':''}},u.referral_count)),
            E('td',null,E(RBar,{score:u.risk_score})),
            E('td',null,E(Bdg,{t:bc(u.status),label:u.status.toUpperCase()})),
            E('td',null,E('span',{className:'mn f10 mt'},fdt(u.last_active)))
          )))
        )
      )
    )
  );
}

/* ═══════════════════════════════════════════════════════
   PANEL: REFERRALS
═══════════════════════════════════════════════════════ */
function ReferralsPanel(){
  const {data:refs,loading,mock,reload}=useDB('referrals','created_at',MK_REFS);
  const [filter,setFilter]=useState('all');
  if(loading)return E('div',{className:'loading',style:{color:'var(--np)'}},'CARGANDO REFERRALS...');
  const active=refs.filter(r=>r.status==='active').length;
  const flagged=refs.filter(r=>r.status==='flagged').length;
  const totalRev=refs.reduce((a,r)=>a+parseFloat(r.revenue_generated||0),0);
  const newToday=refs.filter(r=>r.created_at&&r.created_at.slice(0,10)===TODAY).length;
  const byRef={};refs.forEach(r=>{byRef[r.referrer_email]=(byRef[r.referrer_email]||0)+1;});
  const clusters=Object.entries(byRef).filter(([,n])=>n>=3).map(([email,n])=>({email,n}));
  const filtered=refs.filter(r=>filter==='all'||r.status===filter);
  const topRev={};refs.forEach(r=>{topRev[r.referrer_email]=(topRev[r.referrer_email]||0)+parseFloat(r.revenue_generated||0);});
  const top5=Object.entries(topRev).sort((a,b)=>b[1]-a[1]).slice(0,5);
  return E('div',null,
    E('div',{className:'ph'},E('div',null,E('h1',null,'Referrals Panel'),E('div',{className:'ph-tag'},mock?'[ MOCK DATA ]':'[ LIVE · 30s ]')),E('button',{className:'btn bn-c',onClick:reload},'↻ REFRESH')),
    flagged>0&&E(Alrt,{type:'r',msg:`${flagged} referidos sospechosos — posible granja`}),
    clusters.length>0&&E(Alrt,{type:'a',msg:`${clusters.length} usuario(s) con clusters de referidos sospechosos`}),
    E('div',{className:'kg'},
      E(KPI,{l:'TOTAL REFERIDOS',v:refs.length,s:'histórico',c:'p'}),
      E(KPI,{l:'ACTIVOS',v:active,s:'generando revenue',c:'g'}),
      E(KPI,{l:'REVENUE TOTAL',v:cur(totalRev),s:'por referidos',c:'c'}),
      E(KPI,{l:'FLAGGED',v:flagged,s:'sospechosos',c:'r'}),
      E(KPI,{l:'NUEVOS HOY',v:newToday,s:'registros hoy',c:'a'})
    ),
    E('div',{className:'g2'},
      E('div',{className:'card'},
        E('div',{className:'ch'},'TOP REFERRERS POR REVENUE'),
        top5.length===0?E('p',{className:'mn f11 mt'},'Sin datos'):
        top5.map(([email,rev],i)=>E('div',{key:email,className:'top-row'},
          E('span',{className:'mn f10',style:{color:'var(--na)',minWidth:20}},`#${i+1}`),
          E('span',{style:{flex:1,fontSize:12,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},email),
          E('span',{className:'mn f11',style:{color:'var(--ng)',fontWeight:700,marginRight:7}},cur(rev)),
          E('span',{className:'mn f10 mt'},`×${byRef[email]}`)
        ))
      ),
      E('div',{className:'card'},
        E('div',{className:'ch'},'CLUSTERS SOSPECHOSOS'),
        clusters.length===0?
          E('p',{className:'mn f11',style:{color:'var(--ng)',padding:'8px 0'}},'✓ Sin clusters detectados'):
          clusters.map(c=>E('div',{key:c.email,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid var(--bd)'}},
            E('span',{style:{fontSize:12,color:'var(--nr)'}},c.email),
            E('span',{className:'mn f10',style:{color:'var(--na)'}},`${c.n} referidos`),
            E(Bdg,{t:'r',label:'GRANJA?'})
          ))
      )
    ),
    E('div',{className:'card'},
      E('div',{className:'ch'},E('span',null,'DIRECTORIO'),E('div',{className:'chips'},['all','active','inactive','flagged'].map(f=>E('button',{key:f,className:`chip${filter===f?' on':''}`,onClick:()=>setFilter(f)},f.toUpperCase())))),
      E('div',{className:'tw'},
        E('table',{className:'tbl'},
          E('thead',null,E('tr',null,['ID','REFERRER','REFERIDO','REVENUE','ESTADO','FECHA'].map(h=>E('th',{key:h},h)))),
          E('tbody',null,filtered.map(r=>E('tr',{key:r.id},
            E('td',null,E('span',{className:'mn f10 mt'},r.id)),
            E('td',null,E('span',{style:{color:byRef[r.referrer_email]>=3?'var(--na)':'var(--tx)',fontSize:12}},r.referrer_email)),
            E('td',null,E('span',{style:{fontSize:12}},r.referred_email)),
            E('td',null,E('span',{className:'mn f11',style:{color:'var(--nc)',fontWeight:700}},cur(r.revenue_generated))),
            E('td',null,E(Bdg,{t:bc(r.status),label:r.status.toUpperCase()})),
            E('td',null,E('span',{className:'mn f10 mt'},fdt(r.created_at)))
          )))
        )
      )
    )
  );
}

/* ═══════════════════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════════════════ */
function App(){
  const [page,setPage]=useState('overview');
  const [showCfg,setShowCfg]=useState(isMock());
  const [tick,setTick]=useState(0);
  const [time,setTime]=useState('');
  useEffect(()=>{const iv=setInterval(()=>setTime(new Date().toLocaleTimeString('es')),1000);return()=>clearInterval(iv);},[]);

  const nav=[
    {id:'overview',label:'Overview',icon:'◉'},
    {id:'revenue',label:'Revenue',icon:'▲'},
    {id:'fraud',label:'Fraud',icon:'⚑'},
    {id:'payouts',label:'Payouts',icon:'⊕'},
    {id:'users',label:'Users',icon:'◈'},
    {id:'referrals',label:'Referrals',icon:'⇄'},
  ];

  return E('div',{id:'root'},
    E('div',{className:'sb'},
      E('div',{className:'sb-lg'},E('div',{className:'tg'},'CONTROL CTR'),E('div',{className:'nm'},'AdBanner'),E('div',{className:'vr'},'v2.0 · 6 paneles')),
      E('div',{className:'nav'},
        nav.map(n=>E('div',{key:n.id,className:`ni${page===n.id?' on':''}`,onClick:()=>setPage(n.id)},E('span',{className:'ni-ic'},n.icon),E('span',{className:'nl'},n.label))),
        E('div',{className:'nd'}),
        E('div',{className:'ni',onClick:()=>setShowCfg(!showCfg)},E('span',{className:'ni-ic'},'⚙'),E('span',{className:'nl'},'Supabase'))
      ),
      E('div',{className:'sb-ft'},
        E('div',{className:'sb-st'},E('div',{className:`dot ${isMock()?'dot-a':'dot-g'}`}),E('span',{className:'sb-st-t'},isMock()?'MOCK MODE':'LIVE')),
        E('div',{className:'sb-tm'},time)
      )
    ),
    E('div',{className:'main'},
      showCfg&&E(CfgBar,{onApply:()=>{setShowCfg(false);setTick(t=>t+1);}}),
      E('div',{key:tick},
        page==='overview'&&E(OverviewPanel),
        page==='revenue'&&E(RevenuePanel),
        page==='fraud'&&E(FraudPanel),
        page==='payouts'&&E(PayoutsPanel),
        page==='users'&&E(UsersPanel),
        page==='referrals'&&E(ReferralsPanel)
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(E(App));
}); // ← FIX: fin del window.addEventListener('load')
</script>
</body>
